# =============================================================================
# flow.yaml — 嵌入式调试工作流（单文件线性序号驱动引擎）
#
# 设计理念：
#   - 所有步骤合并到单一文件，按全局唯一 seq 线性编号
#   - 每个 step 格式完全相同：seq / id / phase / what / action / (call|params)
#     / precheck / pre_action / on_success / on_failure
#   - 引擎只做「查表 + 序号跳转」，不再跨文件切状态
#   - phase 仅作为分组标签与 AI 阶段自检（forbidden）使用，不影响跳转
#
# 动作类型枚举（action 字段，受控，校验不过即报错）：
#   run_script      执行脚本命令（call 为命令字符串）
#   check_file      检查文件是否存在
#   read_config     标记/读取调试配置文件
#   ask_user        向用户提问采集参数（AI 执行）
#   edit_source     编辑源码：insert_cheshi / remove_cheshi / fix_bug（AI 执行）
#   analyze         分析日志/定位根因（AI 执行）
#   report          生成详细报告 + 写项目索引和持久记忆（AI 执行）
#   check_regression 全量回归核对清单（AI 执行）
#   update_state    更新流程状态（一般写在 on_success/on_failure 的 do 列表里）
#   log             输出日志
#   wait_user       人工暂停（AI 处理用户后 --wake 恢复）
#   exit            标记流程完成
#   noop            空操作（常用于阶段衔接/纯跳转）
#
# on_success / on_failure 都是「动作列表」，元素为单键对象：
#   - update_state: { 点号路径: 值 }       （"+1" 表示自增）
#   - run_script: "命令"
#   - log: "msg"  或  log: { level: info|warning|error, msg: "..." }
#   - read_config: {}
#   - goto: <seq|id|next|done|wait>         （流向：序号 / id / 下一步 / 结束 / 暂停）
#   - exit: COMPLETED
#   - wait_user: "msg"
#   - when: "条件"                           （条件动作，then/else 为同级列表）
#       then: [ ... ]
#       else: [ ... ]
#
# precheck：执行前断言列表，元素 { assert: "条件", on_fail: [动作列表] }
# pre_action：执行前动作列表（如重试计数 +1）
# =============================================================================

meta:
  name: embedded-debug-workflow
  version: 2
  description: "嵌入式固件调试自动化工作流（单文件线性序号驱动）"
  max_iterations: 8          # 调试循环迭代上限（集中配置）
  max_retry: 2               # 编译/下载/监听连续重试上限（集中配置，当前为 2；编译与下载统一引用）
  max_ask: 3                 # 调试循环中动态追问轮数上限
  state_file: flow-gate.json
  engine: scripts/workflow_engine.py

# 阶段定义：仅用于报告分组与 AI 阶段自检（forbidden），不参与跳转
phases:
  - name: STARTUP
    description: "启动阶段 — 读取配置、采集参数、确认硬件就绪"
    forbidden: [git_log, git_diff, analyze_code, compile, flash]
  - name: DEBUG_LOOP
    description: "调试循环 — CHESHI 迭代、编译下载、日志分析"
    forbidden: [generate_report]
  - name: VERIFY_AND_REPORT
    description: "验证与报告 — 清理 CHESHI、回归验证、生成报告"
    forbidden: [add_cheshi]
  - name: COMPLETED
    description: "已完成 — 允许任意操作"
    forbidden: []

steps:
  # ============================================================
  # STARTUP 阶段
  # ============================================================
  - seq: 1
    id: step_init_config
    phase: STARTUP
    what: "由 Python 完成配置扫描、数字确认和逐项目执行模式选择"
    action: run_script
    call: 'python scripts/config_reader.py --init "{project_dir}" --interactive'
    params:
      behavior: |
        Python 独立完成初始化：扫描/合并 Keil 工程、选择配置与逐项目模式
        （none/compile_only/compile_flash/full）、保存 project_modes，read_config 自动同步状态。
        AI 不再用提问工具确认配置或项目模式。
    precheck: []
    pre_action: []
    on_success:
      - read_config: {}
      - update_state:
          projectInfo.configFound: true
      - goto: 2
    on_failure:
      - update_state:
          projectInfo.configFound: false
      - wait_user: "当前工作区未找到 Keil 工程或配置生成失败。请确认工作区包含 .uvprojx/.uvproj 后再继续。"

  - seq: 2
    id: step_quick_source_review
    phase: STARTUP
    what: "快速审查相关源码和历史记忆，形成故障问题模型；本步骤不提问"
    action: analyze
    params:
      template: |
        1. 快速浏览相关源码入口、任务/中断、通信接口、关键状态变量、近期变更点及日志输出路径。
        2. 读取 data/debug-history.yaml 检查相似历史案例。
        3. 形成简短审查记录（涉及文件/模块、数据流入口、可疑变更点、待验证假设、建议证据）。
          仅做审查与建模，不裁决根因、不编译、不下载、不改源码。
    precheck: []
    pre_action: []
    on_success:
      - update_state:
          projectInfo.memoryChecked: true
          projectInfo.sourcePreAnalyzed: true
          projectInfo.sourceQuickReviewed: true
      - goto: 3
    on_failure:
      - goto: 2

  - seq: 3
    id: step_collect_fault_details
    phase: STARTUP
    what: "使用明确选项追问故障信息，并最后单独询问补充内容"
    action: ask_user
    params:
      template: |
        必须使用 agent 工具询问。
        A. 4 个结构化问题（允许自由补充，不得退化为纯自由文本；除复现情况外均可多选）：
        1. 复现情况：【必现 / 偶现 / 首次出现】。
        2. 影响项目：从 projectInfo.configProjects 动态生成选项（多选）；禁止用旧配置、固定项目名或自行猜测。
        3. 异常类型：【通信 / 数据 / 时序 / 启动 / 硬件 / 其他】。
        4. 已有证据：【串口日志 / 抓包 / 寄存器变量 / 无】。
        B. 动态追问：依据开场描述、A 部分、seq 2 审查与历史记忆生成，最多 3 轮、每轮最多 4 问；
          只问缺失或矛盾信息，禁止机械重复；信息足够可提前结束，不得改变 A 的选项类别。
        C. 追问结束须额外单独询问“请问还有什么补充？”（【无】+自由回答），不计入轮数且必须等待回答。
        全部回答后 --ack success；信息矛盾无法继续时 --ack failure。
      note: "不得重复询问配置与项目模式；影响项目选项须来自最新 configProjects；“请问还有什么补充？”必须独立询问并等待回答。"
    precheck: []
    pre_action: []
    on_success:
      - update_state:
          projectInfo.faultDescribed: true
      - log:
          level: info
          msg: "参数已确认，进入调试流程"
      - goto: 4
    on_failure:
      - goto: 3

  - seq: 4
    id: step_to_debug
    phase: STARTUP
    what: "STARTUP 阶段完成，进入调试循环"
    action: noop
    precheck: []
    pre_action: []
    on_success:
      - when: 'debugLoopInfo.baselineBuildPending == true'
        then:
          - log:
              level: info
              msg: "首次进入调试流程，允许在无源码修改情况下执行一次基线编译/下载/监听"
          - goto: 7
        else:
          - goto: 5
    on_failure:
      - goto: 5

  # ============================================================
  # DEBUG_LOOP 阶段
  # ============================================================
  - seq: 5
    id: step_analyze
    phase: DEBUG_LOOP
    what: "仅定位可疑代码位置（不是根因裁决点，严禁在此汇报/询问）"
    action: analyze
    params:
      mode: locate
      inputs:
        - source: serial_log
          description: "读取串口日志（如有）"
        - source: source_code
          description: "读取相关源代码"
      output:
        field: debugLoopInfo.suspiciousLocation
        format: "<文件:行号> — <怀疑原因>"
      note: |
        本步只负责定位可疑位置并写入 debugLoopInfo.suspiciousLocation，并非“已找到根因”。
        即便强烈怀疑根因（如某函数被删除），也严禁在此汇报结论或询问。
        定位完成后 --ack success 推进。
    precheck: []
    pre_action: []
    on_success:
      - when: 'projectInfo.observeExistingSerial == true'
        then:
          - log:
              level: info
              msg: "本轮只观察板上已有固件，跳过 CHESHI 注入"
          - goto: 7
        else:
          - when: 'projectInfo.hasSerialProjects == true'
            then:
              - goto: 6
            else:
              - log:
                  level: info
                  msg: "没有需要新固件串口验证的项目，跳过插入 CHESHI 调试打印"
              - goto: 7
    on_failure:
      - goto: 5

  - seq: 6
    id: step_add_cheshi
    phase: DEBUG_LOOP
    what: "仅当有必要且能产出新证据时，对 mode=full 项目在可疑位置补充 CHESHI 观测；遇编译失败/语法错误/配置问题等优先修复而非盲目加日志"
    action: edit_source
    params:
      edit_action: insert_cheshi
      macro_ref: "refs/cheshi-macro.md"
      required_state: |
        编辑前后必须核对实际源码差异，并据此设置：
          - 实际新增/修改了本轮有效 CHESHI 源码：
            debugLoopInfo.iterationChangeStatus=modified
            debugLoopInfo.iterationCodeChanged=true
            debugLoopInfo.iterationExecutionAllowed=true
            debugLoopInfo.iterationChangeSummary=<文件、符号和观测点摘要>
          - 已有观测足够，本轮未修改源码：
            debugLoopInfo.iterationChangeStatus=reused
            debugLoopInfo.iterationCodeChanged=false
            debugLoopInfo.iterationExecutionAllowed=false
          - 未产生任何有效修改且已有观测不能提供更多证据：
            debugLoopInfo.iterationChangeStatus=unchanged
            debugLoopInfo.iterationCodeChanged=false
            debugLoopInfo.iterationExecutionAllowed=false
        禁止在未核对真实差异时设置 modified，禁止用注释、空白、重复观测或状态字段更新冒充源码修改。
      note: |
        本轮任何源码或工程配置修改前，必须先 git commit 当前状态建立本轮回退基线；提交完成后再修改，具体事项参考git-rules.md。
        插入 CHESHI 非每轮强制，仅当能缩小范围、验证假设或确认根因时才补充；CHESHI 须下载到板才可见。
        编译失败/语法错误/配置错误/目标板不可用时优先修复问题而非加日志（含从 seq 7 回本步的情况）。
        （edit_source 属 AI 步骤，引擎不执行本步 precheck）
        严禁在此停下汇报或询问故障结论。观测须至少覆盖：函数入口/出口、关键分支或状态跳转、
        输入输出长度、错误码/超时/重试计数、缓冲区索引或计数器、必要的原始帧摘要。
        不得改变业务协议、阻塞通信路径或在 ISR/通信底层直接 printf；通信层只采集快照，由 main 主循环统一输出。
        新增代码须由 CHESHI 条件编译完整包裹（头文件/子宏/常量/类型/变量/函数参数/辅助函数/初始化/
        缓冲区/采集与 Flush/错误路径/计数器/临时分支），禁止裸 printf/puts/日志宏/未受控副作用；
        关闭 CHESHI 后正式代码须可独立编译且行为不变。
        每轮开始前，AI 必须根据当前证据判断是否需要本轮串口监听：需要时设置
        projectInfo.serialCaptureRequested=true，不需要时设置为 false。该判断只影响本轮
        编译/下载后的串口采集，不得把 “full” 模式理解为强制监听。无修改须如实设 reused/unchanged，
        引擎将跳过编译/下载/监听；差异一致后才 --ack success。
    precheck: []
    pre_action: []
    on_success:
      - when: 'debugLoopInfo.iterationCodeChanged == true'
        then:
          - update_state:
              debugLoopInfo.cheshiAdded: true
          - goto: 7
        else:
          - when: 'debugLoopInfo.iterationNewEvidence == true'
            then:
              - log:
                  level: info
                  msg: "本轮无源码修改但已有新证据，跳过编译下载监听，直接分析"
              - goto: 10
            else:
              - wait_user: "本轮未产生新的有效源码修改，也没有新的运行证据；为防止空转，流程已暂停。请提供新排查方向，或允许设计新的 CHESHI 观测点后恢复。"
    on_failure:
      - goto: 6

  - seq: 7
    id: step_compile
    phase: DEBUG_LOOP
    what: "编译固件"
    action: run_script
    call: 'python scripts/multi_project_runner.py --action build --stage debug_build_{debugLoopInfo.iterationCount} --config-dir "{project_dir}" --modes {projectInfo.projectModes}'
    precheck:
      - assert: 'debugLoopInfo.iterationExecutionAllowed == true'
        on_fail:
          - when: 'projectInfo.finishRequested == true'
            then:
              - goto: 17
            else:
              - wait_user: "调试循环中未检测到本轮有效源码修改，已阻止编译、下载和监听。请新增有效观测代码或提供新证据。"
      - assert: 'projectInfo.hasBuildProjects == true'
        on_fail:
          - when: 'projectInfo.finishRequested == true'
            then:
              - log:
                  level: info
                  msg: "已请求结束流程，跳过编译并进入临时代码清理"
              - goto: 17
            else:
              - when: 'projectInfo.observeExistingSerial == true'
                then:
                  - log:
                      level: info
                      msg: "跳过编译下载，直接观察板上已有固件串口"
                  - goto: 9
                else:
                  - when: 'projectInfo.hasFlashProjects == true'
                    then:
                      - log:
                          level: info
                          msg: "已跳过编译，直接下载已有固件"
                      - goto: 8
                    else:
                      - goto: 19
      - assert: "debugLoopInfo.compileRetryCount < {meta.max_retry}"
        on_fail:
          - log:
              level: error
              msg: "编译失败已达到2次，流程暂停；调整后将重新编译"
          - update_state:
              debugLoopInfo.compileRetryCount: 0
          - wait_user: "连续2次编译失败。请调整源码或编译环境，确认后恢复流程，流程将从本编译步骤重试。"
    pre_action:
      - update_state:
          debugLoopInfo.compileRetryCount: "+1"
    on_success:
      - update_state:
          debugLoopInfo.lastBuildStatus: "success"
          debugLoopInfo.compileRetryCount: 0
          debugLoopInfo.baselineBuildPending: false
      - when: 'projectInfo.hasFlashProjects == true'
        then:
          - goto: 8
        else:
          - goto: 10
    on_failure:
      - update_state:
          debugLoopInfo.lastBuildStatus: "failure"
      - when: 'projectInfo.finishRequested == true'
        then:
          - goto: 17
        else:
          - when: "debugLoopInfo.compileRetryCount >= {meta.max_retry}"
            then:
              - log:
                  level: error
                  msg: "连续2次编译失败，流程暂停；调整后将重新编译"
              - update_state:
                  debugLoopInfo.compileRetryCount: 0
              - wait_user: "连续2次编译失败。请调整源码或编译环境，确认后恢复流程，流程将从本编译步骤重试。"
            else:
              - log:
                  level: warning
                  msg: "编译失败，修正后返回加打印"
              - goto: 6

  - seq: 8
    id: step_flash
    phase: DEBUG_LOOP
    what: "下载固件到目标板"
    action: run_script
    call: 'python scripts/multi_project_runner.py --action flash --stage debug_flash_{debugLoopInfo.iterationCount} --config-dir "{project_dir}" --modes {projectInfo.projectModes}'
    precheck:
      - assert: 'debugLoopInfo.lastBuildStatus == "success"'
        on_fail:
          - wait_user: "当前轮没有成功的新构建产物，已阻止下载。请先完成允许的基线编译或有效修改后的编译。"
      - assert: 'projectInfo.hasFlashProjects == true'
        on_fail:
          - goto: 19
      - assert: "debugLoopInfo.retryCount < {meta.max_retry}"
        on_fail:
          - log:
              level: error
              msg: "retryCount ≥ 2，流程暂停；调整后将重新下载"
          - update_state:
              debugLoopInfo.retryCount: 0
          - wait_user: "连续2次下载失败。请调整目标板、下载器或连接，确认后恢复流程，流程将从本下载步骤重试。"
    pre_action:
      - update_state:
          debugLoopInfo.retryCount: "+1"
    on_success:
      - update_state:
          debugLoopInfo.lastFlashStatus: "success"
          debugLoopInfo.retryCount: 0
      - when: 'projectInfo.hasSerialProjects == true'
        then:
          - goto: 9
        else:
          - goto: 10
    on_failure:
      - update_state:
          debugLoopInfo.lastFlashStatus: "failure"
      - when: "debugLoopInfo.retryCount >= {meta.max_retry}"
        then:
          - log:
              level: error
              msg: "连续2次下载失败，流程暂停；调整后将重新下载"
          - update_state:
              debugLoopInfo.retryCount: 0
          - wait_user: "连续2次下载失败。请调整目标板、下载器或连接，确认后恢复流程，流程将从本下载步骤重试。"
        else:
          - goto: 8

  - seq: 9
    id: step_capture_log
    phase: DEBUG_LOOP
    what: "等待10秒后启动串口监听，捕获日志（仅编译下载监听模式会到达本步）"
    action: run_script
    call: 'python scripts/multi_project_runner.py --action serial --stage debug_serial_{debugLoopInfo.iterationCount} --config-dir "{project_dir}" --modes {projectInfo.projectModes} --delay 10 --duration 30 --save "debug_log.txt"'
    precheck:
      - assert: 'debugLoopInfo.iterationExecutionAllowed == true'
        on_fail:
          - when: 'projectInfo.observeExistingSerial == true'
            then:
              - log:
                  level: info
                  msg: "显式观察板上已有固件，允许采集日志"
            else:
              - wait_user: "本轮无有效源码修改且未显式观察已有固件，已阻止重复串口监听。"
    pre_action: []
    on_success:
      - update_state:
          debugLoopInfo.iterationNewEvidence: true
          debugLoopInfo.iterationExecutionAllowed: false
      - goto: 10
    on_failure:
      - update_state:
          debugLoopInfo.lastSerialStatus: "failure"
      - log:
          level: error
          msg: "串口监听失败，流程已暂停"
      - wait_user: "串口监听失败，流程已暂停；确认串口恢复后可继续"

  - seq: 10
    id: step_analyze_result
    phase: DEBUG_LOOP
    what: "分析日志是否足以定位根因"
    action: analyze
    params:
      mode: root_cause
      iteration_ref: debugLoopInfo.iterationCount
      max_iterations: 8
      hint: |
        判断日志是否足以定位根因：
          - 找到根因 → --ack success 推进。
          - 有方向未定位且已设计下一轮不同有效观测 → 先设
            debugLoopInfo.nextObservationPlanned=true、nextObservationSummary=<具体文件/变量/分支>，
            再 --ack failure，引擎才允许 iterationCount+1 回加打印。
          - 无新增观测方案，或本轮既无源码修改又无新证据 → 不得空转；
            保持 nextObservationPlanned=false 后 --ack failure，引擎立即 wait_user 且不增轮次。
          - 没信心需追问 → 先 --set debugLoopInfo.askUser=true 再 --ack failure
            （引擎进入追问环节，最多 meta.max_ask 次，超转人工）。
    precheck: []
    pre_action: []
    on_success:
      - update_state:
          debugLoopInfo.rootCauseFound: true
          debugLoopInfo.iterationExhausted: false
          debugLoopInfo.nextObservationPlanned: false
      - goto: 12            # 跳过追问环节，直接进入验证阶段
    on_failure:
      - when: "debugLoopInfo.askUser == true"
        then:
          - update_state:
              debugLoopInfo.askUser: false
              debugLoopInfo.askCount: "+1"
          - when: "debugLoopInfo.askCount >= 3"
            then:
              - log:
                  level: error
                  msg: "已追问 3 次仍无足够信息，转人工求助"
              - wait_user: "已多次向用户追问仍无法定位根因，请提供排查思路"
            else:
              - log:
                  level: warning
                  msg: "AI 没信心，进入追问环节"
              - goto: 11           # 追问用户
        else:
          - when: 'debugLoopInfo.nextObservationPlanned == false'
            then:
              - wait_user: "当前分析未形成下一轮不同且可执行的观测方案，已阻止无修改、无编译、无下载的空循环。请提供新方向或允许新增具体观测点后恢复。"
            else:
              - when: "debugLoopInfo.iterationCount >= 8"
                then:
                  - log:
                      level: error
                      msg: "连续 8 轮有效迭代未定位根因，转入临时调试代码清理与未解决报告流程"
                  - update_state:
                      debugLoopInfo.iterationExhausted: true
                  - goto: 17
                else:
                  - update_state:
                      debugLoopInfo.iterationCount: "+1"
                      debugLoopInfo.loopReason: "已形成新的有效观测方案，进入下一轮"
                      debugLoopInfo.iterationChangeStatus: "pending"
                      debugLoopInfo.iterationChangeSummary: ""
                      debugLoopInfo.iterationCodeChanged: false
                      debugLoopInfo.iterationExecutionAllowed: false
                      debugLoopInfo.iterationNewEvidence: false
                      debugLoopInfo.nextObservationPlanned: false
                  - goto: 6            # 返回加打印，继续有效迭代

  - seq: 11
    id: step_ask_clarify
    phase: DEBUG_LOOP
    what: "向用户追问以厘清根因方向（AI 没信心时进入）"
    action: ask_user
    params:
      template: |
        我目前还无法定位根因，需要你补充信息（可多选，按情形回答）：
          1️⃣ 该故障首次出现的时间 / 版本 / 变更点？
          2️⃣ 是否必现？复现频率与触发条件？
          3️⃣ 相关模块 / 接口 / 信号的正常预期行为是什么？
          4️⃣ 是否与其他已知问题相关？
          5️⃣ 有无可提供的额外日志 / 抓包 / 寄存器值 / 变量取值？
      note: "仅在 AI 没信心时由 step_analyze_result 进入；用户回答后 --ack success 推进。"
    precheck: []
    pre_action: []
    on_success:
      - goto: 10            # 回到分析，结合新信息重新判断
    on_failure:
      - goto: 10

  # ============================================================
  # VERIFY_AND_REPORT 阶段
  # ============================================================
  - seq: 12
    id: step_fix_code
    phase: VERIFY_AND_REPORT
    what: "根据根因分析结果修改业务代码，并加入可证伪的临时验证观测"
    action: edit_source
    params:
      edit_action: fix_bug
      note: |
        修复须同时设计与根因对应的验证条件，并在修复处增加临时检测观测
        （关键变量/长度/索引/状态/错误码、计数器、超时与重试结果或不变量断言），能区分“故障已消失”与“仅未复现”并覆盖回归风险。
        检测代码须用 CHESHI 包裹；通信层只记录快照，不得直接 printf 或阻塞通信，由 main 统一输出。
        若调整时序，须先记录原基线再验证间隔/超时/队列未被破坏。
        seq 13~16 须基于观测结果判断，不能仅以编译/下载成功作为修复依据。
    precheck: []
    pre_action: []
    on_success:
      - goto: 13
    on_failure:
      - goto: 12

  - seq: 13
    id: step_verify_build
    phase: VERIFY_AND_REPORT
    what: "逐项目编译修复后的固件（mode=none 的项目跳过）"
    action: run_script
    call: 'python scripts/multi_project_runner.py --action build --stage verify_build_{debugLoopInfo.iterationCount} --config-dir "{project_dir}" --modes {projectInfo.projectModes}'
    precheck:
      - assert: 'projectInfo.hasBuildProjects == true'
        on_fail:
          - when: 'projectInfo.finishRequested == true'
            then:
              - log:
                  level: info
                  msg: "已请求结束流程，跳过验证编译并进入临时代码清理"
              - goto: 17
            else:
              - when: 'projectInfo.hasFlashProjects == true'
                then:
                  - log:
                      level: info
                      msg: "验证阶段已跳过编译，直接下载已有固件"
                  - goto: 14
                else:
                  - goto: 16
      - assert: "debugLoopInfo.compileRetryCount < {meta.max_retry}"
        on_fail:
          - log:
              level: error
              msg: "验证编译失败已达到2次，流程暂停；调整后将重新编译"
          - update_state:
              debugLoopInfo.compileRetryCount: 0
          - wait_user: "修复后的固件连续2次编译失败。请调整源码或编译环境，确认后恢复流程，流程将从本编译步骤重试。"
    pre_action:
      - update_state:
          debugLoopInfo.compileRetryCount: "+1"
    on_success:
      - update_state:
          debugLoopInfo.compileRetryCount: 0
      - when: 'projectInfo.hasFlashProjects == true'
        then:
          - goto: 14
        else:
          - goto: 16
    on_failure:
      - update_state:
          debugLoopInfo.iterationCount: "+1"
          debugLoopInfo.loopReason: "修复后的固件编译未通过，返回定位并修正"
      - when: 'projectInfo.finishRequested == true'
        then:
          - goto: 17
        else:
          - when: "debugLoopInfo.compileRetryCount >= {meta.max_retry}"
            then:
              - log:
                  level: error
                  msg: "验证阶段连续2次编译失败，流程暂停；调整后将重新编译"
              - update_state:
                  debugLoopInfo.compileRetryCount: 0
              - wait_user: "修复后的固件连续2次编译失败。请调整源码或编译环境，确认后恢复流程，流程将从本编译步骤重试。"
            else:
              - goto: 5

  - seq: 14
    id: step_verify_flash
    phase: VERIFY_AND_REPORT
    what: "逐项目下载修复后的固件（仅 compile_flash/full 项目执行）"
    action: run_script
    call: 'python scripts/multi_project_runner.py --action flash --stage verify_flash_{debugLoopInfo.iterationCount} --config-dir "{project_dir}" --modes {projectInfo.projectModes}'
    precheck:
      - assert: 'projectInfo.hasFlashProjects == true'
        on_fail:
          - goto: 16
    pre_action: []
    on_success:
      - when: 'projectInfo.hasSerialProjects == true'
        then:
          - log:
              level: info
              msg: "full 模式项目下载成功，开始串口验证"
          - goto: 15
        else:
          - goto: 16
    on_failure:
      - log:
          level: error
          msg: "修复固件下载失败，流程暂停；调整后将重新下载"
      - wait_user: "修复固件下载失败。请调整目标板、下载器或连接，确认后恢复流程，流程将从本下载步骤重试。"

  - seq: 15
    id: step_verify_capture_log
    phase: VERIFY_AND_REPORT
    what: "等待10秒后持续读取串口并保存修复验证日志，确认运行期间没有复现问题"
    action: run_script
    call: 'python scripts/multi_project_runner.py --action serial --stage verify_serial_{debugLoopInfo.iterationCount} --config-dir "{project_dir}" --modes {projectInfo.projectModes} --delay 10 --duration 30 --save "verify_log.txt"'
    precheck: []
    pre_action: []
    on_success:
      - goto: 16
    on_failure:
      - update_state:
          debugLoopInfo.lastSerialStatus: "failure"
      - log:
          level: error
          msg: "修复验证阶段串口监听失败，流程已暂停"
      - wait_user: "串口监听失败，流程已暂停；确认串口恢复后可继续"

  - seq: 16
    id: step_confirm_fix
    phase: VERIFY_AND_REPORT
    what: "分析验证日志，确认修复检测条件成立、原故障未复现且没有新增异常"
    action: analyze
    params:
      mode: verify_fix
      log_pattern: "{project_dir}/{settings.paths.copilot_dir}/{settings.paths.workspace_data_dir}/{settings.paths.logs_dir}/verify_log_p*_<项目名>.txt"
      note: |
        mode=full 项目须分别读取验证日志，确认观测窗口内修复检测条件成立、原故障未复现、
        CHESHI 观测值符合预期且无新增错误，才 --ack success 推进。
        任何异常或证据不足均 --ack failure，退回 DEBUG_LOOP 重新定位与验证。
        compile_flash 仅确认编译和下载；compile_only 仅确认编译；none 未执行。
        须据 projectInfo.projectRuns 逐项目记录验证等级，禁止把 full 板端结论扩展到其他项目。
    precheck: []
    pre_action: []
    on_success:
      - update_state:
          verifyReport.fixConfirmed: true
      - goto: 17
    on_failure:
      - update_state:
          verifyReport.fixConfirmed: false
          debugLoopInfo.iterationCount: "+1"
          debugLoopInfo.loopReason: "验证证据不足或故障仍然存在，返回调试循环"
      - goto: 5

  - seq: 17
    id: step_clean_cheshi
    phase: VERIFY_AND_REPORT
    what: "流程退出前删除本次新增的全部 CHESHI 临时调试代码（脚本化）；无论故障已解决或迭代耗尽均须清理"
    action: run_script
    call: 'python scripts/remove_cheshi.py --config-dir "{project_dir}"'
    params:
      note: |
        脚本先 git 提交当前状态作为回退基线（保证 AI 之后能定位出错），再扫描各工程源码移除
        CHESHI 条件编译块与宏定义/横幅注释，并校验无残留符号。
        Keil 工程配置(Define/Include Path/源文件)若由 AI 在插入时记录，请按记录恢复；本脚本仅清理源码块。
        不得删除项目原有 CHESHI 代码。fixConfirmed=false 时仍须完成清理，并在报告记录“未解决/未定位根因”。
    precheck: []
    pre_action: []
    on_success:
      - update_state:
          verifyReport.cheshiCleaned: true
      - goto: 18
    on_failure:
      - wait_user: "CHESHI 清理脚本返回错误（残留符号/文件见脚本输出 JSON 的 residual 字段）。请 AI 检查哪些调用未完整包裹 CHESHI 条件编译并修复，或确认无法清理；处理后再恢复流程，由 AI 判断是否重试 step 17。"

  - seq: 18
    id: step_clean_build
    phase: VERIFY_AND_REPORT
    what: "清理 CHESHI 后重新编译，确认正式源码仍可通过编译"
    action: run_script
    call: 'python scripts/multi_project_runner.py --action build --stage clean_build --config-dir "{project_dir}" --modes {projectInfo.projectModes}'
    precheck:
      - assert: 'projectInfo.hasBuildProjects == true'
        on_fail:
          - when: 'projectInfo.finishRequested == true'
            then:
              - goto: 20
            else:
              - when: "debugLoopInfo.iterationExhausted == true"
                then:
                  - goto: 20
                else:
                  - goto: 19
    pre_action: []
    on_success:
      - when: "debugLoopInfo.iterationExhausted == true"
        then:
          - goto: 20
        else:
          - goto: 19
    on_failure:
      - when: 'projectInfo.finishRequested == true'
        then:
          - log:
              level: warning
              msg: "结束流程时清理后编译仍失败；记录为未验证并继续生成报告"
          - goto: 20
        else:
          - log:
              level: error
              msg: "清理 CHESHI 后编译失败，流程暂停；调整后将重新编译"
          - wait_user: "清理 CHESHI 后编译失败。请调整源码或编译环境，确认后恢复流程，流程将从本编译步骤重试。"

  - seq: 19
    id: step_regression
    phase: VERIFY_AND_REPORT
    what: "确认修复未引入新问题，其他功能模块正常（脚本化确定性检查 + AI 复核）"
    action: run_script
    call: 'python scripts/regression_check.py --config-dir "{project_dir}"'
    params:
      checklist:
        - "配置完整：config_reader.py --validate 通过（keil/projects/serial/debugger 齐全）"
        - "编译输出 0 Error、无阻塞性 Warning"
        - "固件下载成功：日志出现 Flash Load finished / Verify OK"
        - "各项目验证日志已分别存至 Skill 专属数据目录"
        - "CHESHI 调试代码已整段清理，清理后重编 0 Error"
        - "业务修改仅影响目标模块，无连锁副作用（长度/偏移/缓冲区边界已复核）— 需 AI 复核"
        - "原故障现象消失，其它模块（通信/定时器/中断/外设）正常 — 需 AI 复核"
        - "调试打印信息充分，可支撑故障定位 — 需 AI 复核"
    precheck: []
    pre_action: []
    on_success:
      - goto: 20
    on_failure:
      - update_state:
          debugLoopInfo.iterationCount: "+1"
          debugLoopInfo.loopReason: "回归检查未通过，返回调试循环继续排查"
      - goto: 5

  - seq: 20
    id: step_report
    phase: VERIFY_AND_REPORT
    what: "生成包含完整证据链的详细报告，并写入项目索引和持久记忆"
    action: report
    params:
      report_template: "templates/report.md"
      report_path: "{project_dir}/{settings.paths.copilot_dir}/{settings.paths.workspace_data_dir}/{settings.paths.reports_dir}/{date}_{short_desc}.md"
      requirements: |
        必须填完模板全部 11 节，以当前对话为主线，结合源码、Git 差异、流程状态、
        编译/下载输出与串口日志形成可追溯证据链。记录失败尝试、排除过程、修复原理、
        修改符号、验证命令与实际结果、回归风险及未验证事项。未知内容写“未提供”或
        “未验证”，禁止猜测或伪造证据；不得将编译成功等同于故障已解决。
      report_fields:
        - conversation_context
        - environment_and_config
        - fault_description
        - reproduction_steps
        - investigation_timeline
        - root_cause
        - evidence_chain
        - fix_summary
        - files_changed
        - verification_logs
        - verification_limits
        - regression_risks
        - follow_up_actions
      memory_entry:
        path: "data/debug-history.yaml"
        format: |
          - date: "{date}"
            desc: "{short_desc}"
            fault: "{fault_description}"
            root_cause: "{root_cause}"
            status: "{resolution_status}"
            verification: "{verification_summary}"
            report: "{report_path}"
            source: "workflow"
      persistent_memory:
        path: "/memories/embedded-debug-workflow.md"
        operation: "append_or_update"
        fields:
          - date
          - project_name
          - fault_description
          - root_cause
          - fix_summary
          - verification_summary
          - resolution_status
          - report_path
        rules: |
          写入前先查看 /memories/，优先更新已有文件；只保存可复用摘要与报告绝对路径，
          不复制整篇报告，不保存凭据或大段日志；同一 report_path 不得重复写入。
    precheck: []
    pre_action: []
    on_success:
      - update_state:
          debugSession.reportFile: "{report_path}"
          debugSession.memorySaved: true
          debugSession.endTime: "{now}"
      - goto: 21
    on_failure:
      # 禁止无条件自跳转（与 test-terminator 同源反模式）：报告生成失败转人工暂停，
      # 避免 AI 反复 --ack failure 时回到同一步形成空转。
      - wait_user: "报告生成失败。请补充证据或修正报告内容后，使用 --wake 恢复流程（不会自动重试覆盖）。"

  - seq: 21
    id: step_complete
    phase: VERIFY_AND_REPORT
    what: "标记全部流程完成"
    action: exit
    precheck: []
    pre_action: []
    on_success:
      - exit: COMPLETED
    on_failure:
      - exit: COMPLETED
