phase: DEBUG_LOOP
description: "调试循环 — CHESHI 迭代、编译下载、日志分析（上限 8 轮）"
version: 1

steps:
  # ============================================================
  # Step 1: 分析日志 / 定位可疑代码
  # ============================================================
  - id: step_analyze
    description: "分析日志 / 定位可疑代码"
    type: analyze_code
    inputs:
      - source: serial_log
        description: "读取串口日志（如有）"
      - source: source_code
        description: "读取相关源代码"
    output:
      field: debugLoopInfo.suspiciousLocation
      format: "<文件:行号> — <怀疑原因>"

  # ============================================================
  # Step 2: 添加 CHESHI 调试打印
  # ============================================================
  - id: step_add_cheshi
    description: "在可疑代码位置插入 CHESHI 调试打印"
    type: edit_source
    action: insert_cheshi
    macro_ref: "refs/cheshi-macro.md"
    on_complete:
      - type: update_state
        fields:
          debugLoopInfo.cheshiAdded: true

  # ============================================================
  # Step 3: 编译固件
  # ============================================================
  - id: step_compile
    description: "编译固件"
    type: compile
    project: "{project_file}"
    uv4_path: "C:\\Keil_v5\\UV4\\UV4.exe"
    on_success:
      - type: update_state
        fields:
          debugLoopInfo.lastBuildStatus: "success"
    on_failure:
      - type: update_state
        fields:
          debugLoopInfo.lastBuildStatus: "failure"
      - type: log_warning
        message: "编译失败，修正后返回 step_add_cheshi"
      - type: goto_step
        step: step_add_cheshi

  # ============================================================
  # Step 4: 下载固件
  # ============================================================
  - id: step_flash
    description: "下载固件到目标板"
    type: flash
    project: "{project_file}"
    uv4_path: "C:\\Keil_v5\\UV4\\UV4.exe"
    retry: 1
    on_success:
      - type: update_state
        fields:
          debugLoopInfo.lastFlashStatus: "success"
    on_failure:
      - type: update_state
        fields:
          debugLoopInfo.lastFlashStatus: "failure"
    retry_failure:
      - type: wait_user
        message: "下载失败，请检查 JLink 连接和目标板供电，确认后重试"
        retry_step: step_flash

  # ============================================================
  # Step 5: 读取串口日志
  # ============================================================
  - id: step_capture_log
    description: "启动串口监听，捕获日志"
    type: serial_capture
    port: "{serial_port}"
    baud: "{serial_baud}"
    duration: 15
    save_to: "{project_dir}/MDK-ARM/logs/debug_log.txt"
    note: "先启动监听，再请用户复位目标板，确保捕获到启动阶段日志"

  # ============================================================
  # Step 6: 分析结果
  # ============================================================
  - id: step_analyze_result
    description: "分析日志是否足以定位根因"
    type: analyze_result
    iteration_ref: debugLoopInfo.iterationCount
    max_iterations: 8
    root_cause_found:
      - type: update_state
        fields:
          debugLoopInfo.rootCauseFound: true
      - type: exit_phase
        next_phase: VERIFY_AND_REPORT
        update_state:
          currentPhase: "VERIFY_AND_REPORT"
          completedPhases: ["+DEBUG_LOOP"]
          currentGateFile: "gates/VERIFY_AND_REPORT.yaml"
    insufficient_iterations_remaining:
      - type: update_state
        fields:
          debugLoopInfo.iterationCount: "+1"
      - type: goto_step
        step: step_add_cheshi
    insufficient_max_reached:
      - type: wait_user
        message: "已满 8 轮迭代仍无法定位根因，请提供排查思路"
        retry_step: step_analyze_result
