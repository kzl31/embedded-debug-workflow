phase: STARTUP
description: "启动阶段 — 读取配置、采集参数、确认硬件就绪"
version: 1

steps:
  # ============================================================
  # Step 1: 检查配置文件
  # ============================================================
  - id: step_check_config
    description: "检查项目目录下是否存在 embedded-debug-config.json"
    type: check_file
    target: embedded-debug-config.json
    search_paths: ["{project_dir}", "{project_dir}/.copilot"]
    found:
      - type: read_config
      - type: update_state
        fields:
          projectInfo.configFound: true
    missing:
      - type: run_script
        script: 'python scripts/config_reader.py --init "{project_dir}"'
        wait: true
        description: "执行初始化 — 自动扫描 .uvprojx 工程目录"
      - type: update_state
        fields:
          projectInfo.configFound: true
          projectInfo.serialConfirmed: true

  # ============================================================
  # Step 2: 采集硬件数量与绑定关系
  # ============================================================
  - id: step_collect_params
    description: "采集参数：故障现象 + 工程配置确认 + 编译下载模式"
    type: ask_user
    note: |
      你（AI）先读取用户在开场描述的问题，再动态生成澄清问题。总共两轮：
        第一轮 5 条（含工程配置确认、编译下载模式确认、3 条动态故障澄清）；
        第二轮最多 3 条（继续追问锁定根因）。
      每条用「emoji 序号 + 问题？ + 说明。【选项】」格式。
      确认后用 --set projectInfo.buildMode=<full|compile_only|none> 记录，再 --done 推进。
    template: |
      请按以下格式向我（用户）提问（如果有选项框工具，请务必使用选项款）：

      ▶ 第一轮（共 5 条）
      1️⃣ 工程配置是否已完成？ 若未完成，请直接在 embedded-debug-config.json 中补全串口/下载器/工程目录后保存，回到此处确认。【已完成 / 未完成】
      2️⃣ 本次需要编译下载吗？ 【编译+下载（完整流程） / 仅编译不下载 / 暂不编译下载（仅定位问题）】
      3️⃣~5️⃣ （由你根据我开场描述的故障动态生成，用于确定到底是什么问题；例如：现象细节、复现条件、相关模块/接口、已有排查手段等，每条附【选项】）

      ▶ 第二轮（最多 3 条）
      根据你上一轮的回答继续追问，进一步锁定根因方向（每条：问题？ 说明。【选项】）。

      两轮结束后，请明确记录我的选择并继续。
    branches:
      fault_described:
        - type: update_state
          fields:
            projectInfo.faultDescribed: true
      config_confirmed:
        - type: update_state
          fields:
            projectInfo.configConfirmed: true
      all_confirmed:
        - type: log_info
          message: "参数已确认，进入调试流程"

  # ============================================================
  # Step 3: 标记完成
  # ============================================================
  - id: step_exit
    description: "完成 STARTUP 阶段，进入 DEBUG_LOOP"
    type: exit_phase
    next_phase: DEBUG_LOOP
    update_state:
      currentPhase: "DEBUG_LOOP"
      completedPhases: ["+STARTUP"]
      currentGateFile: "gates/DEBUG_LOOP.yaml"
      projectInfo:
        serialConfirmed: true
        hardwareReady: true
        faultDescribed: true
        configConfirmed: true

