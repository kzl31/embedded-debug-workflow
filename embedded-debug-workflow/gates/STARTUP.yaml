phase: STARTUP
description: "启动阶段 — 读取配置、采集参数、确认硬件就绪"
version: 1

steps:
  # ============================================================
  # Step 1: 检查配置文件
  # ============================================================
  - id: step_check_config
    description: "检查项目目录下是否存在 embedded-debug-config.json"
    type: check_file
    target: embedded-debug-config.json
    search_paths: ["{project_dir}", "{project_dir}/MDK-ARM"]
    found:
      - type: read_config
      - type: update_state
        fields:
          projectInfo.configFound: true
    missing:
      - type: run_script
        script: 'python scripts/config_reader.py --init "{project_dir}"'
        wait: true
        description: "执行初始化 — 自动扫描 .uvprojx，等待用户输入串口/下载器/设备标识"
      - type: update_state
        fields:
          projectInfo.configFound: true
          projectInfo.serialConfirmed: true

  # ============================================================
  # Step 2: 一次性采集全部参数
  # ============================================================
  - id: step_collect_params
    description: "采集参数：串口变化、故障描述"
    type: ask_user
    note: "JLink 默认已连接，目标板默认已上电，无需用户确认。下载失败会自动重试1次。"
    template: |
      当前项目配置：
        📍 串口: COM{port} @ {baud}
        🔧 调试器: {type} (SN: {sn})
        📌 设备: {role} | {comm_link}

      请确认以下问题：
        1️⃣ 串口号/波特率是否有变化？        【无变化 / 输入新端口号如 COM5】
        2️⃣ 当前故障现象描述？               【描述故障 / 无】
    branches:
      serial_changed:
        - type: run_script
          script: 'python scripts/config_reader.py --set-port "{new_port}" --path "{project_dir}"'
      fault_described:
        - type: update_state
          fields:
            projectInfo.faultDescribed: true
      all_confirmed:
        - type: log_info
          message: "参数已确认，JLink 默认已连接，继续执行"

  # ============================================================
  # Step 3: 标记完成
  # ============================================================
  - id: step_exit
    description: "完成 STARTUP 阶段，进入 DEBUG_LOOP"
    type: exit_phase
    next_phase: DEBUG_LOOP
    update_state:
      currentPhase: "DEBUG_LOOP"
      completedPhases: ["+STARTUP"]
      currentGateFile: "gates/DEBUG_LOOP.yaml"
      projectInfo:
        serialConfirmed: true
        hardwareReady: true
        faultDescribed: true
