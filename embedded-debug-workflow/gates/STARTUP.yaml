phase: STARTUP
description: "启动阶段 — 读取配置、采集参数、确认硬件就绪"
version: 1

steps:
  # ============================================================
  # Step 1: 检查配置文件
  # ============================================================
  - id: step_check_config
    description: "检查项目目录下是否存在 embedded-debug-config.json"
    type: check_file
    target: embedded-debug-config.json
    search_paths: ["{project_dir}", "{project_dir}/.copilot"]
    found:
      - type: read_config
      - type: update_state
        fields:
          projectInfo.configFound: true
    missing:
      - type: run_script
        script: 'python scripts/config_reader.py --init "{project_dir}"'
        wait: true
        description: "执行初始化 — 自动扫描 .uvprojx，等待用户输入串口/下载器/设备标识"
      - type: update_state
        fields:
          projectInfo.configFound: true
          projectInfo.serialConfirmed: true

  # ============================================================
  # Step 2: 采集硬件数量与绑定关系
  # ============================================================
  - id: step_collect_params
    description: "采集参数：故障现象 + 工程配置确认"
    type: ask_user
    note: "工程配置由用户直接在 embedded-debug-config.json 中修改，无需逐项询问；本步仅确认故障现象与配置是否就绪。"
    template: |
      请回答以下问题：

        ① 当前出现了什么故障？
          【请描述故障现象，例如：RU3 与 RU2 串口通信丢包 / 某状态机卡死 / 数据解析错误 …】

        ② 工程配置是否已完？
          【已完成 / 未完成】
          若未完成，请直接在配置文件 embedded-debug-config.json 中补全串口、下载器、工程目录等，
          保存后回到此处点「确认」继续；配置无需在此逐项询问。
    branches:
      fault_described:
        - type: update_state
          fields:
            projectInfo.faultDescribed: true
      config_confirmed:
        - type: update_state
          fields:
            projectInfo.configConfirmed: true
      all_confirmed:
        - type: log_info
          message: "参数已确认，进入调试流程"

  # ============================================================
  # Step 3: 标记完成
  # ============================================================
  - id: step_exit
    description: "完成 STARTUP 阶段，进入 DEBUG_LOOP"
    type: exit_phase
    next_phase: DEBUG_LOOP
    update_state:
      currentPhase: "DEBUG_LOOP"
      completedPhases: ["+STARTUP"]
      currentGateFile: "gates/DEBUG_LOOP.yaml"
      projectInfo:
        serialConfirmed: true
        hardwareReady: true
        faultDescribed: true
        configConfirmed: true

