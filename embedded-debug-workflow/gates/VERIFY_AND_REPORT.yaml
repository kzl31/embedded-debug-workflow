phase: VERIFY_AND_REPORT
description: "验证与报告 — 清理 CHESHI、回归验证、生成总结报告并写记忆"
version: 1

steps:
  # ============================================================
  # Step 1: 清理 CHESHI 宏
  # ============================================================
  - id: step_clean_cheshi
    description: "删除所有 CHESHI 调试代码块，恢复源代码"
    type: edit_source
    action: remove_cheshi
    compile_verify: true
    on_complete:
      - type: update_state
        fields:
          verifyReport.cheshiCleaned: true

  # ============================================================
  # Step 2: 修改业务代码修复
  # ============================================================
  - id: step_fix_code
    description: "根据根因分析结果修改业务代码，最小化改动范围"
    type: edit_source
    action: fix_bug
    note: "修改前先 git commit 当前状态，以便回退"

  # ============================================================
  # Step 3: 编译 + 下载 + 验证
  # ============================================================
  - id: step_verify_build
    description: "编译并验证故障已解决（buildMode=none 时跳过）"
    type: run_script
    script: 'python scripts/keil_build.py --config-dir "{project_dir}"'
    precheck:
      - type: assert
        condition: "projectInfo / buildMode != \"none\""
        on_fail:
          - type: goto_step
            step: step_regression
    on_success:
      - type: log_info
        message: "编译通过"
    on_failure:
      - type: goto_step
        step: step_analyze
        gate: "gates/DEBUG_LOOP.yaml"
        description: "验证失败，返回 DEBUG_LOOP 重新分析"

  - id: step_verify_flash
    description: "下载固件并验证（仅 buildMode=full 执行）"
    type: run_script
    script: 'python scripts/keil_flash.py --config-dir "{project_dir}"'
    precheck:
      - type: assert
        condition: "projectInfo / buildMode == \"full\""
        on_fail:
          - type: goto_step
            step: step_regression
    on_success:
      - type: log_info
        message: "验证通过，故障已解决"
      - type: run_script
        script: 'python scripts/serial_monitor.py --duration 10 --save "{project_dir}/.copilot/logs/verify_log.txt"'
        description: "串口监听验证"
    on_failure:
      - type: goto_step
        step: step_analyze
        gate: "gates/DEBUG_LOOP.yaml"
        description: "验证失败，返回 DEBUG_LOOP 重新分析"

  # ============================================================
  # Step 4: 全量回归验证
  # ============================================================
  - id: step_regression
    description: "确认修复未引入新问题，其他功能模块正常"
    type: check_regression
    checklist:
      - "配置完整：config_reader.py --validate 通过（keil/projects/serial/debugger 齐全）"
      - "串口参数与配置一致：监听端口/波特率取自对应工程的 serial"
      - "编译输出 0 Error、无阻塞性 Warning"
      - "固件下载成功：日志出现 Flash Load finished / Verify OK"
      - "验证日志已保存到 {项目目录}/.copilot/logs/verify_log.txt"
      - "调试打印信息充分，可支撑故障定位"
      - "业务修改仅影响目标模块，无连锁副作用（长度/偏移/缓冲区边界已复核）"
      - "原故障现象消失，其它模块（通信/定时器/中断/外设）正常"
      - "CHESHI 调试代码已整段清理，清理后重编 0 Error"
      - "最终版本全量编译下载正常通过"

  # ============================================================
  # Step 5: 输出报告 + 写记忆 + 生成 .md 文件
  # ============================================================
  - id: step_report
    description: "生成标准化报告 .md + 写记忆索引"
    type: generate_report
    report_template: "templates/report.md"
    report_path: "{project_dir}/.copilot/报告/{date}_{short_desc}.md"
    report_fields:
      - fault_description
      - root_cause
      - fix_summary
      - files_changed
      - verification_logs
    memory_entry:
      path: "data/debug-history.yaml"
      format: |
        - date: "{date}"
          desc: "{short_desc}"
          fault: "{fault_description}"
          root_cause: "{root_cause}"
          report: "{report_path}"
    on_complete:
      - type: update_state
        fields:
          debugSession.reportFile: "{report_path}"
          debugSession.memorySaved: true
          debugSession.endTime: "{now}"

  # ============================================================
  # Step 6: 标记 COMPLETED
  # ============================================================
  - id: step_complete
    description: "标记全部流程完成"
    type: exit_phase
    next_phase: COMPLETED
    update_state:
      currentPhase: "COMPLETED"
      completedPhases: ["+VERIFY_AND_REPORT"]
      currentGateFile: null
