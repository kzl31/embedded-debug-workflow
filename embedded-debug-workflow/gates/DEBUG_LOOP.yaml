phase: DEBUG_LOOP
description: "调试循环 — CHESHI 迭代、编译下载、日志分析（上限 8 轮）"
version: 1

steps:
  # ============================================================
  # Step 1: 分析日志 / 定位可疑代码
  # ============================================================
  - id: step_analyze
    description: "分析日志 / 定位可疑代码"
    type: analyze_code
    inputs:
      - source: serial_log
        description: "读取串口日志（如有）"
      - source: source_code
        description: "读取相关源代码"
    output:
      field: debugLoopInfo.suspiciousLocation
      format: "<文件:行号> — <怀疑原因>"

  # ============================================================
  # Step 2: 添加 CHESHI 调试打印
  # ============================================================
  - id: step_add_cheshi
    description: "在可疑代码位置插入 CHESHI 调试打印"
    type: edit_source
    action: insert_cheshi
    macro_ref: "refs/cheshi-macro.md"
    on_complete:
      - type: update_state
        fields:
          debugLoopInfo.cheshiAdded: true

  # ============================================================
  # Step 3: 编译固件
  # ============================================================
  - id: step_compile
    description: "编译固件"
    type: run_script
    script: 'python scripts/keil_build.py --config-dir "{project_dir}"'
    on_success:
      - type: update_state
        fields:
          debugLoopInfo.lastBuildStatus: "success"
    on_failure:
      - type: update_state
        fields:
          debugLoopInfo.lastBuildStatus: "failure"
      - type: log_warning
        message: "编译失败，修正后返回 step_add_cheshi"
      - type: goto_step
        step: step_add_cheshi

  # ============================================================
  # Step 4: 下载固件
  # ============================================================
  - id: step_flash
    description: "下载固件到目标板"
    type: run_script
    script: 'python scripts/keil_flash.py --config-dir "{project_dir}"'
    note: "执行前检查状态中 debugLoopInfo.retryCount ≥ 2 则直接结束流程，不执行下载"
    precheck:
      - type: assert
        condition: "debugLoopInfo / retryCount < 2"
        on_fail:
          - type: log_error
            message: "retryCount ≥ 2，已达最大重试次数，禁止继续下载"
          - type: exit_phase
            next_phase: COMPLETED
    pre_action:
      - type: update_state
        fields:
          debugLoopInfo.retryCount: "+1"
    on_success:
      - type: update_state
        fields:
          debugLoopInfo.lastFlashStatus: "success"
          debugLoopInfo.retryCount: 0
    on_failure:
      - type: update_state
        fields:
          debugLoopInfo.lastFlashStatus: "failure"
      - type: assert
        condition: "debugLoopInfo / retryCount >= 2"
        on_success:
          - type: log_error
            message: "连续2次下载失败（retryCount=2），结束流程"
          - type: exit_phase
            next_phase: COMPLETED
            update_state:
              currentPhase: "COMPLETED"
              completedPhases: ["+DEBUG_LOOP"]
              currentGateFile: null
              debugSession.endTime: "{now}"
              debugSession.faultSummary: "下载失败：连续2次失败"
      - type: goto_step
        step: step_flash
        note: "retryCount < 2，自动重试下载"

  # ============================================================
  # Step 5: 读取串口日志
  # ============================================================
  - id: step_capture_log
    description: "启动串口监听，捕获日志"
    type: run_script
    script: 'python scripts/serial_monitor.py --config-dir "{project_dir}" --project-dir "{project_dir}" --duration 30 --save "{project_dir}/MDK-ARM(AC5)/logs/debug_log.txt"'
    note: |
      先启动监听，再请用户复位目标板，确保捕获到启动阶段日志。
      串口规则：
        - 默认 JLink CDC UART 为调试串口（auto_detect_port 优先匹配）
        - 配置端口不可用时自动扫描可用串口并更新配置
        - 监听时长 30 秒，足以捕获启动日志 + 1秒周期的 SAFEGUARD 统计
    precheck:
      - type: assert
        condition: "debugLoopInfo / retryCount < 2"
        on_fail:
          - type: log_error
            message: "retryCount ≥ 2，已达最大重试次数，结束流程"
          - type: exit_phase
            next_phase: COMPLETED
    pre_action:
      - type: update_state
        fields:
          debugLoopInfo.retryCount: "+1"
    on_success:
      - type: update_state
        fields:
          debugLoopInfo.retryCount: 0
    on_failure:
      - type: update_state
        fields:
          debugLoopInfo.lastFlashStatus: "failure"
      - type: assert
        condition: "debugLoopInfo / retryCount >= 2"
        on_success:
          - type: log_error
            message: "连续2次串口打开失败（retryCount=2），结束流程"
          - type: exit_phase
            next_phase: COMPLETED
      - type: goto_step
        step: step_capture_log
        note: "retryCount < 2，自动重试串口监听"

  # ============================================================
  # Step 6: 分析结果
  # ============================================================
  - id: step_analyze_result
    description: "分析日志是否足以定位根因"
    type: analyze_result
    iteration_ref: debugLoopInfo.iterationCount
    max_iterations: 8
    root_cause_found:
      - type: update_state
        fields:
          debugLoopInfo.rootCauseFound: true
      - type: exit_phase
        next_phase: VERIFY_AND_REPORT
        update_state:
          currentPhase: "VERIFY_AND_REPORT"
          completedPhases: ["+DEBUG_LOOP"]
          currentGateFile: "gates/VERIFY_AND_REPORT.yaml"
    insufficient_iterations_remaining:
      - type: update_state
        fields:
          debugLoopInfo.iterationCount: "+1"
      - type: goto_step
        step: step_add_cheshi
    insufficient_max_reached:
      - type: wait_user
        message: "已满 8 轮迭代仍无法定位根因，请提供排查思路"
        retry_step: step_analyze_result
