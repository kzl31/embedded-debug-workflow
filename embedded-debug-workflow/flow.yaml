# =============================================================================
# flow.yaml — 嵌入式调试工作流（单文件线性序号驱动引擎）
#
# 设计理念：
#   - 所有步骤合并到单一文件，按全局唯一 seq 线性编号
#   - 每个 step 格式完全相同：seq / id / phase / what / action / (call|params)
#     / precheck / pre_action / on_success / on_failure
#   - 引擎只做「查表 + 序号跳转」，不再跨文件切状态
#   - phase 仅作为分组标签与 AI 阶段自检（forbidden）使用，不影响跳转
#
# 动作类型枚举（action 字段，受控，校验不过即报错）：
#   run_script      执行脚本命令（call 为命令字符串）
#   check_file      检查文件是否存在
#   read_config     标记/读取调试配置文件
#   ask_user        向用户提问采集参数（AI 执行）
#   edit_source     编辑源码：insert_cheshi / remove_cheshi / fix_bug（AI 执行）
#   analyze         分析日志/定位根因（AI 执行）
#   report          生成标准化报告 + 写记忆（AI 执行）
#   check_regression 全量回归核对清单（AI 执行）
#   update_state    更新流程状态（一般写在 on_success/on_failure 的 do 列表里）
#   log             输出日志
#   wait_user       人工暂停（AI 处理用户后 --wake 恢复）
#   exit            标记流程完成
#   noop            空操作（常用于阶段衔接/纯跳转）
#
# on_success / on_failure 都是「动作列表」，元素为单键对象：
#   - update_state: { 点号路径: 值 }       （"+1" 表示自增）
#   - run_script: "命令"
#   - log: "msg"  或  log: { level: info|warning|error, msg: "..." }
#   - read_config: {}
#   - goto: <seq|id|next|done|wait>         （流向：序号 / id / 下一步 / 结束 / 暂停）
#   - exit: COMPLETED
#   - wait_user: "msg"
#   - when: "条件"                           （条件动作，then/else 为同级列表）
#       then: [ ... ]
#       else: [ ... ]
#
# precheck：执行前断言列表，元素 { assert: "条件", on_fail: [动作列表] }
# pre_action：执行前动作列表（如重试计数 +1）
# =============================================================================

meta:
  name: embedded-debug-workflow
  version: 2
  description: "嵌入式固件调试自动化工作流（单文件线性序号驱动）"
  max_iterations: 8          # 调试循环迭代上限（集中配置）
  max_retry: 2               # 下载/监听连续重试上限（集中配置）
  max_ask: 3                 # AI 没信心时向用户追问的次数上限（集中配置）
  state_file: flow-gate.json
  engine: scripts/workflow_engine.py

# 阶段定义：仅用于报告分组与 AI 阶段自检（forbidden），不参与跳转
phases:
  - name: STARTUP
    description: "启动阶段 — 读取配置、采集参数、确认硬件就绪"
    forbidden: [git_log, git_diff, analyze_code, compile, flash]
  - name: DEBUG_LOOP
    description: "调试循环 — CHESHI 迭代、编译下载、日志分析"
    forbidden: [generate_report]
  - name: VERIFY_AND_REPORT
    description: "验证与报告 — 清理 CHESHI、回归验证、生成报告"
    forbidden: [add_cheshi]
  - name: COMPLETED
    description: "已完成 — 允许任意操作"
    forbidden: []

steps:
  # ============================================================
  # STARTUP 阶段
  # ============================================================
  - seq: 1
    id: step_check_config
    phase: STARTUP
    what: "检查项目目录下是否存在嵌入式调试配置文件"
    action: check_file
    params:
      target: embedded-debug-config.json
      search_paths:
        - "{project_dir}"
        - "{project_dir}/.copilot"
    precheck: []
    pre_action: []
    on_success:
      - read_config: {}
      - update_state:
          projectInfo.configFound: true
    on_failure:
      - run_script: 'python scripts/config_reader.py --init "{project_dir}"'
      - update_state:
          projectInfo.configFound: true
          projectInfo.serialConfirmed: true

  - seq: 2
    id: step_collect_params
    phase: STARTUP
    what: "采集参数：故障现象 + 工程配置确认 + 编译下载模式（共三轮提问）"
    action: ask_user
    params:
      template: |
        请向我（用户）提问**如果有选项框工具，请务必使用选项框**：

        ▶ 第一轮（共 5 条）
        1️⃣ 工程配置是否已完成？ 若未完成，请直接在 embedded-debug-config.json 中补全串口/下载器/工程目录后保存，回到此处确认。【已完成 / 未完成】
        2️⃣ 本次需要编译下载吗？ 【编译+下载（完整流程） / 仅编译不下载 / 暂不编译下载（仅定位问题）】
        3️⃣~5️⃣ （由你根据我开场描述的故障动态生成，用于确定到底是什么问题；例如：现象细节、复现条件、相关模块/接口、已有排查手段等，每条附【选项】）

        ▶ 第二轮（最多 3 条）
        根据你上一轮的回答继续追问，进一步锁定根因方向（每条：问题？ 说明。【选项】）。

        ▶ 第三轮（最多 3 条）
        仍不确定时再补充追问（如变更点 / 复现频率 / 相关模块预期行为 / 可提供的额外日志）。
        三轮结束后，请明确记录我的选择并继续。
      note: |
        你（AI）先读取用户在开场描述的问题，再动态生成澄清问题，共三轮：
          第一轮 5 条（含工程配置确认、编译下载模式确认、3 条动态故障澄清）；
          第二轮最多 3 条（继续追问锁定根因）；
          第三轮最多 3 条（仍不确定时再补充追问）。
        确认后用 --set projectInfo.buildMode=<full|compile_only|none> 记录，再 --ack success 推进。
    precheck: []
    pre_action: []
    on_success:
      - update_state:
          projectInfo.faultDescribed: true
          projectInfo.configConfirmed: true
      - log:
          level: info
          msg: "参数已确认，进入调试流程"
      - goto: 3
    on_failure:
      - goto: 2

  - seq: 3
    id: step_to_debug
    phase: STARTUP
    what: "STARTUP 阶段完成，进入调试循环"
    action: noop
    precheck: []
    pre_action: []
    on_success:
      - goto: 4
    on_failure:
      - goto: 4

  # ============================================================
  # DEBUG_LOOP 阶段
  # ============================================================
  - seq: 4
    id: step_analyze
    phase: DEBUG_LOOP
    what: "仅定位可疑代码位置（不是根因裁决点，严禁在此汇报/询问）"
    action: analyze
    params:
      mode: locate
      inputs:
        - source: serial_log
          description: "读取串口日志（如有）"
        - source: source_code
          description: "读取相关源代码"
      output:
        field: debugLoopInfo.suspiciousLocation
        format: "<文件:行号> — <怀疑原因>"
    note: |
      本步只负责"定位可疑位置"并写入 debugLoopInfo.suspiciousLocation，
      绝不是"已找到根因"的终点——是否定位根因由 seq 9 统一裁决。
      即便你已强烈怀疑根因（如某函数被删除），也严禁在此向用户汇报结论或询问。
      定位完成后 --ack success：
        - buildMode=full（会下载）→ 进入 seq 5 插入 CHESHI 做实证验证；
        - 非 full（不下载）→ CHESHI 打印无法验证，引擎自动跳过 seq 5 直接进 seq 6。
      （遵循强制规则 6：运行中不可随意停下；询问只发生在 seq 2 与 seq 10。）
    precheck: []
    pre_action: []
    on_success:
      - when: 'projectInfo.buildMode == "full"'
        then:
          - goto: 5
        else:
          - log:
              level: info
              msg: "未下载固件（buildMode≠full），跳过插入 CHESHI 调试打印"
          - goto: 6
    on_failure:
      - goto: 4

  - seq: 5
    id: step_add_cheshi
    phase: DEBUG_LOOP
    what: "在可疑位置插入 CHESHI 调试打印（仅 buildMode=full 时执行；迭代验证手段，严禁停下）"
    action: edit_source
    params:
      edit_action: insert_cheshi
      macro_ref: "refs/cheshi-macro.md"
    note: |
      CHESHI 打印需下载到目标板运行才能看到日志，未下载时插入无意义。
      是否进入本步由 seq 4 依据 buildMode 判断：仅 buildMode=full 才会到达这里。
      （edit_source 属 AI 步骤，引擎不执行本步 precheck，跳过判断放在 seq 4。）
      到达本步时：无论此刻是否已猜到根因，都必须插入打印做实证，
      不能因为"心里有数"就跳过，也严禁在此停下向用户汇报或询问故障结论；
      确认插入完成即 --ack success 进入编译/下载环节。
      注：若因 seq 6 编译失败回到本步，此时应修复编译错误（而非纠结插打印）。
    precheck: []
    pre_action: []
    on_success:
      - update_state:
          debugLoopInfo.cheshiAdded: true
      - goto: 6
    on_failure:
      - goto: 5

  - seq: 6
    id: step_compile
    phase: DEBUG_LOOP
    what: "编译固件"
    action: run_script
    call: 'python scripts/keil_build.py --config-dir "{project_dir}"'
    precheck:
      - assert: 'projectInfo.buildMode != "none"'
        on_fail:
          - goto: 7
    pre_action: []
    on_success:
      - update_state:
          debugLoopInfo.lastBuildStatus: "success"
      - goto: 7
    on_failure:
      - update_state:
          debugLoopInfo.lastBuildStatus: "failure"
      - log:
          level: warning
          msg: "编译失败，修正后返回加打印"
      - goto: 5

  - seq: 7
    id: step_flash
    phase: DEBUG_LOOP
    what: "下载固件到目标板"
    action: run_script
    call: 'python scripts/keil_flash.py --config-dir "{project_dir}"'
    precheck:
      - assert: "debugLoopInfo.retryCount < 2"
        on_fail:
          - log:
              level: error
              msg: "retryCount ≥ 2，已达最大重试次数，禁止继续下载"
          - exit: COMPLETED
      - assert: 'projectInfo.buildMode == "full"'
        on_fail:
          - goto: 8
    pre_action:
      - update_state:
          debugLoopInfo.retryCount: "+1"
    on_success:
      - update_state:
          debugLoopInfo.lastFlashStatus: "success"
          debugLoopInfo.retryCount: 0
      - goto: 8
    on_failure:
      - update_state:
          debugLoopInfo.lastFlashStatus: "failure"
      - when: "debugLoopInfo.retryCount >= 2"
        then:
          - log:
              level: error
              msg: "连续2次下载失败（retryCount=2），结束流程"
          - exit: COMPLETED
        else:
          - goto: 7

  - seq: 8
    id: step_capture_log
    phase: DEBUG_LOOP
    what: "启动串口监听，捕获日志（仅 buildMode=full 且已下载时执行）"
    action: run_script
    call: 'python scripts/serial_monitor.py --config-dir "{project_dir}" --project-dir "{project_dir}" --duration 30 --save "{project_dir}/.copilot/logs/debug_log.txt"'
    precheck:
      - assert: 'projectInfo.buildMode == "full"'
        on_fail:
          - log:
              level: info
              msg: "未下载固件（buildMode≠full），跳过串口监听"
          - goto: 9
      - assert: "debugLoopInfo.retryCount < 2"
        on_fail:
          - log:
              level: error
              msg: "retryCount ≥ 2，已达最大重试次数，结束流程"
          - exit: COMPLETED
    pre_action:
      - update_state:
          debugLoopInfo.retryCount: "+1"
    on_success:
      - update_state:
          debugLoopInfo.retryCount: 0
      - goto: 9
    on_failure:
      - update_state:
          debugLoopInfo.lastFlashStatus: "failure"
      - when: "debugLoopInfo.retryCount >= 2"
        then:
          - log:
              level: error
              msg: "连续2次串口打开失败（retryCount=2），结束流程"
          - exit: COMPLETED
        else:
          - goto: 8

  - seq: 9
    id: step_analyze_result
    phase: DEBUG_LOOP
    what: "分析日志是否足以定位根因"
    action: analyze
    params:
      mode: root_cause
      iteration_ref: debugLoopInfo.iterationCount
      max_iterations: 8
      hint: |
        判断日志是否足以定位根因：
          - 找到根因 → --ack success（进入验证阶段）
          - 有方向但未定位 → --ack failure（引擎推进迭代，iterationCount+1 回到加打印）
          - 没有信心、需要向用户追问 → 先 --set debugLoopInfo.askUser=true 再 --ack failure
            （引擎会进入追问环节，最多追问 meta.max_ask 次，超过转人工求助）
    precheck: []
    pre_action: []
    on_success:
      - update_state:
          debugLoopInfo.rootCauseFound: true
      - goto: 11            # 跳过追问环节，直接进入验证阶段
    on_failure:
      - when: "debugLoopInfo.askUser == true"
        then:
          - update_state:
              debugLoopInfo.askUser: false
              debugLoopInfo.askCount: "+1"
          - when: "debugLoopInfo.askCount >= 3"
            then:
              - log:
                  level: error
                  msg: "已追问 3 次仍无足够信息，转人工求助"
              - wait_user: "已多次向用户追问仍无法定位根因，请提供排查思路"
            else:
              - log:
                  level: warning
                  msg: "AI 没信心，进入追问环节"
              - goto: 10           # 追问用户
        else:
          - when: "debugLoopInfo.iterationCount >= 8"
            then:
              - log:
                  level: error
                  msg: "连续 8 轮迭代未定位根因，结束流程"
              - exit: COMPLETED
            else:
              - update_state:
                  debugLoopInfo.iterationCount: "+1"
              - goto: 5            # 返回加打印，继续迭代

  - seq: 10
    id: step_ask_clarify
    phase: DEBUG_LOOP
    what: "向用户追问以厘清根因方向（AI 没信心时进入）"
    action: ask_user
    params:
      template: |
        我目前还无法定位根因，需要你补充信息（可多选，按情形回答）：
          1️⃣ 该故障首次出现的时间 / 版本 / 变更点？
          2️⃣ 是否必现？复现频率与触发条件？
          3️⃣ 相关模块 / 接口 / 信号的正常预期行为是什么？
          4️⃣ 是否与其他已知问题相关？
          5️⃣ 有无可提供的额外日志 / 抓包 / 寄存器值 / 变量取值？
      note: |
        本步骤仅在 AI 没信心时由 step_analyze_result 跳转进入。
        用户回答后 --ack success，回到 step_analyze_result（seq 9）结合新信息重新判断。
    precheck: []
    pre_action: []
    on_success:
      - goto: 9            # 回到分析，结合新信息重新判断
    on_failure:
      - goto: 9

  # ============================================================
  # VERIFY_AND_REPORT 阶段
  # ============================================================
  - seq: 11
    id: step_clean_cheshi
    phase: VERIFY_AND_REPORT
    what: "删除所有 CHESHI 调试代码块，恢复源代码"
    action: edit_source
    params:
      edit_action: remove_cheshi
      compile_verify: true
    precheck: []
    pre_action: []
    on_success:
      - update_state:
          verifyReport.cheshiCleaned: true
      - goto: 12
    on_failure:
      - goto: 11

  - seq: 12
    id: step_fix_code
    phase: VERIFY_AND_REPORT
    what: "根据根因分析结果修改业务代码，最小化改动范围"
    action: edit_source
    params:
      edit_action: fix_bug
      note: "修改前先 git commit 当前状态，以便回退"
    precheck: []
    pre_action: []
    on_success:
      - goto: 13
    on_failure:
      - goto: 12

  - seq: 13
    id: step_verify_build
    phase: VERIFY_AND_REPORT
    what: "编译并验证故障已解决（buildMode=none 时跳过）"
    action: run_script
    call: 'python scripts/keil_build.py --config-dir "{project_dir}"'
    precheck:
      - assert: 'projectInfo.buildMode != "none"'
        on_fail:
          - goto: 14
    pre_action: []
    on_success:
      - log:
          level: info
          msg: "编译通过"
      - goto: 14
    on_failure:
      - goto: 4

  - seq: 14
    id: step_verify_flash
    phase: VERIFY_AND_REPORT
    what: "下载固件并验证（仅 buildMode=full 执行）"
    action: run_script
    call: 'python scripts/keil_flash.py --config-dir "{project_dir}"'
    precheck:
      - assert: 'projectInfo.buildMode == "full"'
        on_fail:
          - goto: 15
    pre_action: []
    on_success:
      - log:
          level: info
          msg: "验证通过，故障已解决"
      - run_script: 'python scripts/serial_monitor.py --duration 10 --save "{project_dir}/.copilot/logs/verify_log.txt"'
      - goto: 15
    on_failure:
      - goto: 4

  - seq: 15
    id: step_regression
    phase: VERIFY_AND_REPORT
    what: "确认修复未引入新问题，其他功能模块正常"
    action: check_regression
    params:
      checklist:
        - "配置完整：config_reader.py --validate 通过（keil/projects/serial/debugger 齐全）"
        - "串口参数与配置一致：监听端口/波特率取自对应工程的 serial"
        - "编译输出 0 Error、无阻塞性 Warning"
        - "固件下载成功：日志出现 Flash Load finished / Verify OK"
        - "验证日志已保存到 {项目目录}/.copilot/logs/verify_log.txt"
        - "调试打印信息充分，可支撑故障定位"
        - "业务修改仅影响目标模块，无连锁副作用（长度/偏移/缓冲区边界已复核）"
        - "原故障现象消失，其它模块（通信/定时器/中断/外设）正常"
        - "CHESHI 调试代码已整段清理，清理后重编 0 Error"
        - "最终版本全量编译下载正常通过"
    precheck: []
    pre_action: []
    on_success:
      - goto: 16
    on_failure:
      - goto: 15

  - seq: 16
    id: step_report
    phase: VERIFY_AND_REPORT
    what: "生成标准化报告 .md + 写记忆索引"
    action: report
    params:
      report_template: "templates/report.md"
      report_path: "{project_dir}/.copilot/报告/{date}_{short_desc}.md"
      report_fields:
        - fault_description
        - root_cause
        - fix_summary
        - files_changed
        - verification_logs
      memory_entry:
        path: "data/debug-history.yaml"
        format: |
          - date: "{date}"
            desc: "{short_desc}"
            fault: "{fault_description}"
            root_cause: "{root_cause}"
            report: "{report_path}"
    precheck: []
    pre_action: []
    on_success:
      - update_state:
          debugSession.reportFile: "{report_path}"
          debugSession.memorySaved: true
          debugSession.endTime: "{now}"
      - goto: 17
    on_failure:
      - goto: 16

  - seq: 17
    id: step_complete
    phase: VERIFY_AND_REPORT
    what: "标记全部流程完成"
    action: exit
    precheck: []
    pre_action: []
    on_success:
      - goto: done
    on_failure:
      - goto: done
